<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ecs7search — Поиск тегов SCADA ECS7</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <button type="button" id="btn-back-to-top" title="Наверх">↑</button>
    <button type="button" id="btn-scroll-to-bottom" title="Вниз">↓</button>

    <!-- Image viewer modal -->
    <div class="modal-overlay" id="image-modal">
        <div class="modal-content">
            <button type="button" class="modal-close" id="modal-close-btn" title="Закрыть">✕</button>
            <button type="button" class="modal-nav-btn modal-nav-prev" id="modal-prev-btn" title="Предыдущее изображение">‹</button>
            <button type="button" class="modal-nav-btn modal-nav-next" id="modal-next-btn" title="Следующее изображение">›</button>
            <img id="modal-image" src="" alt="Увеличенное изображение">
            <div class="modal-counter" id="modal-counter"></div>
        </div>
    </div>

    <div class="navbar">
        <div class="navbar-title">🔍 ecs7search — Поиск тегов SCADA ECS7</div>
        <nav>
            <a href="/">Поиск</a>
            <span style="color:#7f8c8d; margin:0 6px;">|</span>
            <a href="/settings">Настройки</a>
        </nav>
    </div>

    <div class="container">
        {% block content %}{% endblock %}

        <footer>
            ecs7search — SCADA ECS7 Mimic Files Search Tool
        </footer>
    </div>

    <script>
        // Scroll buttons
        let backToTopButton = document.getElementById("btn-back-to-top");
        let scrollToBottomButton = document.getElementById("btn-scroll-to-bottom");

        window.onscroll = function() {
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                backToTopButton.style.display = "block";
            } else {
                backToTopButton.style.display = "none";
            }
            let scrollHeight = document.documentElement.scrollHeight;
            let clientHeight = document.documentElement.clientHeight;
            let scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            if (scrollTop + clientHeight < scrollHeight - 300) {
                scrollToBottomButton.style.display = "block";
            } else {
                scrollToBottomButton.style.display = "none";
            }
        };

        backToTopButton.addEventListener("click", function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        scrollToBottomButton.addEventListener("click", function() {
            window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        });

        // Image modal
        const imageModal = document.getElementById("image-modal");
        const modalImage = document.getElementById("modal-image");
        const modalCloseBtn = document.getElementById("modal-close-btn");
        const modalPrevBtn = document.getElementById("modal-prev-btn");
        const modalNextBtn = document.getElementById("modal-next-btn");
        const modalCounter = document.getElementById("modal-counter");

        let allZoomableImages = [];
        let currentImageIndex = 0;

        function openModal(imgSrc) {
            allZoomableImages = Array.from(document.querySelectorAll(".zoomable"));
            const clickedIndex = allZoomableImages.findIndex(img => img.src === imgSrc);
            currentImageIndex = clickedIndex >= 0 ? clickedIndex : 0;
            updateModalImage();
            imageModal.classList.add("active");
            document.body.style.overflow = "hidden";
        }

        function updateModalImage() {
            if (allZoomableImages.length === 0) return;
            const img = allZoomableImages[currentImageIndex];
            modalImage.src = img.src;
            modalImage.alt = img.alt || "";
            modalCounter.textContent = (currentImageIndex + 1) + " / " + allZoomableImages.length;
            modalPrevBtn.disabled = allZoomableImages.length <= 1;
            modalNextBtn.disabled = allZoomableImages.length <= 1;
        }

        function closeModal() {
            imageModal.classList.remove("active");
            document.body.style.overflow = "";
            modalImage.src = "";
            modalCounter.textContent = "";
            allZoomableImages = [];
        }

        function navigateModal(direction) {
            if (allZoomableImages.length <= 1) return;
            currentImageIndex = (currentImageIndex + direction + allZoomableImages.length) % allZoomableImages.length;
            updateModalImage();
        }

        // Open modal on click for images with class "zoomable"
        document.addEventListener("click", function(e) {
            if (e.target.classList.contains("zoomable")) {
                e.preventDefault();
                openModal(e.target.src);
            }
        });

        // Close on button click
        modalCloseBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            closeModal();
        });

        // Navigate buttons
        modalPrevBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            navigateModal(-1);
        });

        modalNextBtn.addEventListener("click", function(e) {
            e.stopPropagation();
            navigateModal(1);
        });

        // Close on overlay click (outside image)
        imageModal.addEventListener("click", function(e) {
            if (e.target === imageModal) {
                closeModal();
            }
        });

        // Keyboard navigation
        document.addEventListener("keydown", function(e) {
            if (!imageModal.classList.contains("active")) return;

            if (e.key === "Escape") {
                closeModal();
            } else if (e.key === "ArrowLeft" || e.key === " ") {
                e.preventDefault();
                navigateModal(-1);
            } else if (e.key === "ArrowRight") {
                e.preventDefault();
                navigateModal(1);
            }
        });
    </script>
</body>
</html>
